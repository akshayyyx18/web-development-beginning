<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 50px;
            width: 90px;
            border: 4px solid black;
            background-color: aqua;
            position: relative;
            top: 10px;
            left: 10px;
            text-align: center;

           animation-name: ghumiii;
           animation-duration: 2s;
           animation-timing-function: ease-in-out;
           animation-delay: 1s;
           animation-iteration-count: 6;
           animation-direction: alternate;
        }
        @keyframes ghumiii {
         from{left: 10px;}
         to{left: 150px;}   
        }
    </style>
</head>
<body>
    <div id="box" class="box">animation</div>
</body>
</html>
