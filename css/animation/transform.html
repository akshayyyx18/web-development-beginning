<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        .box{
            height: 100px;
            width: 100px;
            padding: 5px;
            margin: 50px;
            border: 4px solid;
            border-color: black;
    border-radius: 5px;
    transition: all 1s ease-in-out 0ms;
        }
        #box1{ background-color: aqua;}
        #box1:hover{transform: rotate(45deg);}
         #box2{ background-color: rgb(89, 0, 255);}
        #box2:hover{transform: scale(2);}
         #box3{ background-color: rgb(255, 119, 0);}
        #box3:hover{transform: translate(50px);}
         #box4{ background-color: rgb(0, 255, 21);}
        #box4:hover{transform: skew(45deg);}
    </style>
</head>
<body>
    <div id="box1" class="box">box 1 </div>
    <div id="box2" class="box">box 2</div>
     <div id="box3" class="box">box 3</div>  
     <div id="box4" class="box">box 4</div>
</body>
</html>
