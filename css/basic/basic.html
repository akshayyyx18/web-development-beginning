<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color and background</title>
    <style>
        h1{/* comment out in css. internal styling*/
            color: red;
        }
        #first {color: aqua;}
        .second{color: blue;}
         *{
        margin:0;
        padding: 0;
    }
    .background {
        color: aqua;
        background-color: brown;
    }
    /* RGB R-255,G-255,B-255*/
    /* alpha channel - visibility(0.0-1.0)*/
    </style>
</head>
<body>
   <h1> This is heading</h1> 
   <!--inline styling-->
   <p style="color:blue;">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ipsum reiciendis, error doloribus provident voluptatibus quidem praesentium iure veritatis enim sint.</p>
   <p id="first">my name is this that</p>
   <div class="second">this is second</div>
   <div class="background">background colour </div>
</body>
</html>
