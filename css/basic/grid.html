<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <style>
        #container{
            display: grid;
            grid-template-columns: 50px 50px;
             grid-template-rows: 50px 50px;
        }
        #box1{
            grid-column: 1/2;
            grid-row: 1/2;
            background-color: blue;
        }
        #box2{
            grid-column: 2/2;
            grid-row: 1/2;
            background-color: rgb(221, 255, 0);
        }
        #box3{
            grid-column: 1/2;
            grid-row: 2/2;
            background-color: rgb(255, 0, 0);
        }
        #box4{
            grid-column: 2/2;
            grid-row: 2/2;
            background-color: rgb(30, 255, 0);
        }
    </style>
</head>
<body>
     <h1 id="heading">Flex Container</h1>
    <div id="container">
        <div id="box1" class="box">item 1</div>
        <div id="box2" class="box">item 2</div>
        <div id="box3" class="box">item 3</div>
        <div id="box4" class="box">item 4</div>
       
    </div>
</body>
</html>
