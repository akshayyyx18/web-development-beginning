<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>
         
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age"><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" placeholder="Enter your date of birth"><br><br>

        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file"><br><br>

        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color"><br><br>

        <label for="range">Select a Range:</label>
        <input type="range" id="range" name="range" min="0" max="100"><br><br> 

        <label for="button">click me</label>
        <input type="button" id="button" name="button" value="Click Me"><br><br>
<!--radio is used for selecting one option from a set of options-->
        Radio:
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label><br><br>

        <!--checkbox is used for selecting multiple options from a set of options-->
        Checkbox:<br>
        <label for="wake up at 6">Wake up at 6 AM</label>
        <input type="checkbox" id="wake up at 6" name="wake up at 6" value="yes">
        <br><br>

         <label for="exercise">Exercise:</label>
        <input type="checkbox" id="exercise" name="exercise" value="yes"><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
