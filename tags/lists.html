<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists</title>
</head>
<body>
    <!--this is ordered list-->
    <ol type="A">
        <li>Item 1</li>
        <ol>
            <li>Sub Item 1</li>
            <li>Sub Item 2</li>
        </ol>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
<!--this is unordered list-->
    <ul>
        <li>Item 1</li>
        <ul>
            <li>Sub Item 1</li>
            <li>Sub Item 2</li>
        </ul>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
</body>
</html>
